<!DOCTYPE html>
<html lang="pt-BR">



<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Controle de Passagens</title>


    <!-- Ícone do navegador -->
    <link rel="icon" type="image/jpg" href="icons/icon2.jpg">


    <!-- PWA -->
    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#0d6efd">


    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">


    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">


</head>


<body>


    <div class="app">


        <div class="card">


            <div class="logo">
                🚌
            </div>


            <h1>
                Controle de Passagens
            </h1>


            <p>
                Registro de bilhete
            </p>



            <label>
                Número da passagem
            </label>

            <input id="numero-bilhete" type="text" placeholder="Ex: 000123">



            <label>
                Foto do bilhete
            </label>



            <button id="botao-camera" class="btn camera">

                 Abrir câmera

            </button>



            <input id="foto-bilhete" type="file" accept="image/*" capture="environment" hidden>



            <img id="preview-foto" class="preview" hidden>



            <button id="botao-remover-foto" class="btn remover" hidden>

                 Remover foto

            </button>



            <button id="botao-registrar" class="btn">

                Registrar passagem

            </button>





            <div id="resultado" class="resultado" hidden>


                <h2 id="resultado-titulo">
                </h2>


                <p>
                    Bilhete:
                    <strong id="resultado-bilhete"></strong>
                </p>


                <p>
                    Leituras:
                    <strong id="resultado-leituras"></strong>
                </p>



            </div>


        </div>


    </div>




    <script type="module" src="js/app.js">
    </script>


</body>

</html>
